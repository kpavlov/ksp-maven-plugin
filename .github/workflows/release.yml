name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version to publish, for example `0.4.2`
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: release
    env:
      MANUAL_RELEASE_VERSION: ${{ inputs.release_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release-tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            tag_name="${{ github.event.release.tag_name }}"
          else
            tag_name="v${MANUAL_RELEASE_VERSION}"
          fi

          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"

      - name: Check out release tag
        run: |
          git fetch --force --tags origin
          git checkout "${{ steps.release-tag.outputs.tag_name }}"

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Publish release to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -B -P release clean deploy
